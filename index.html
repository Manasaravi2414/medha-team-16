<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PassionPath — Archival Authority</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&family=Space+Grotesk:wght@300..700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

<!-- React + Babel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Manrope', sans-serif; background: #fff8f3; color: #231a0d; overflow: hidden; }
  #root { height: 100vh; display: flex; }

  .font-serif  { font-family: 'Newsreader', serif; }
  .font-mono   { font-family: 'Space Grotesk', monospace; }

  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined';
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block; vertical-align: middle; line-height: 1;
    font-size: 22px; user-select: none;
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e0bfb4; border-radius: 10px; }

  .archival-gradient { background: linear-gradient(135deg, #a23700 0%, #c84b0f 100%); }

  /* Sidebar nav button resets */
  button { font-family: inherit; cursor: pointer; }
  a { text-decoration: none; }

  /* Page fade-in */
  .page-enter { animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Hover utility */
  .hover-bg:hover { background: #fdebd5 !important; }

  /* Mobile nav — hidden on wide screens */
  .mobile-nav { display: none; }
  @media (max-width: 768px) {
    .sidebar { display: none !important; }
    .mobile-nav { display: flex !important; }
    .top-nav-links { display: none !important; }
    .search-bar { display: none !important; }
    .page-wrap { padding: 24px 20px 80px !important; }
  }

  /* Mentor 3-col */
  .mentor-grid { display: flex; flex: 1; overflow: hidden; }
  @media (max-width: 900px) {
    .mentor-col1, .mentor-col3 { display: none; }
  }

  /* Responsive bento */
  .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
  @media (max-width: 1024px) {
    .bento-grid { grid-template-columns: 1fr; }
    .span-5, .span-7, .span-6 { grid-column: span 1 !important; }
  }

  /* Path cards */
  .path-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
  @media (max-width: 900px) { .path-grid { grid-template-columns: 1fr; } }

  .missions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  @media (max-width: 900px) { .missions-grid { grid-template-columns: 1fr; } }

  .discover-grid { display: grid; grid-template-columns: 1fr 340px; gap: 48px; }
  @media (max-width: 1100px) { .discover-grid { grid-template-columns: 1fr; } }

  .growth-dash { display: grid; grid-template-columns: 1fr 320px; gap: 32px; align-items: start; }
  @media (max-width: 1000px) { .growth-dash { grid-template-columns: 1fr; } }

  .micro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 700px) { .micro-grid { grid-template-columns: 1fr; } }

  .friction-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  @media (max-width: 800px) { .friction-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback } = React;

/* ── Tokens ── */
const C = {
  primary:     '#a23700',
  primaryCont: '#c84b0f',
  onSurface:   '#231a0d',
  onSurfVar:   '#594139',
  surface:     '#fff8f3',
  surfCont:    '#fdebd5',
  surfContLow: '#fff2e2',
  surfContHi:  '#f7e6cf',
  surfContMax: '#f2e0ca',
  outlineVar:  '#e0bfb4',
  tertiary:    '#136938',
  secondary:   '#3f5f92',
};

const NAV = [
  { id:'home',     icon:'home',        label:'Home'     },
  { id:'discover', icon:'explore',     label:'Discover' },
  { id:'path',     icon:'insights',    label:'Path'     },
  { id:'mentor',   icon:'school',      label:'Mentor'   },
  { id:'growth',   icon:'trending_up', label:'Growth'   },
];

/* ── Shared Avatar ── */
const AVATAR = 'https://lh3.googleusercontent.com/aida-public/AB6AXuByXMkm001dj2OhzZp6DmG2Vo3AdEoaunhs-23cN6bkFNRj6GSqV3TaxNGGDx3LYRKHy3Eav1I1he0NQU3CmKCkMJaphux6a9-dhiT3r2EOb6PtKSu3wR-zSZWvXiGrQgIil9BDpXtt4GTFNXfcFVnh5m8K9OAVUNSpajRe-ytVXVM8DYlptA3YThCBrnL9bnGa9O7v4y7H2FEXwhPItgMs5n3jabj7cORqqd9skqwgiSb92iSi5qqB6-nmpKWsrUXyWu5N3Dl40gQ';

/* ─────────────────── SIDEBAR ─────────────────── */
function Sidebar({ active, setPage }) {
  return (
    <aside className="sidebar" style={{
      width:240, flexShrink:0, height:'100vh', position:'sticky', top:0,
      borderRight:`1px solid ${C.onSurface}18`, background:C.surface,
      display:'flex', flexDirection:'column', padding:'28px 0', gap:20,
      overflowY:'auto',
    }}>
      <div style={{ padding:'0 28px 12px' }}>
        <div className="font-serif" style={{ fontSize:21, fontWeight:500 }}>PassionPath</div>
        <div className="font-mono" style={{ fontSize:9, textTransform:'uppercase', letterSpacing:'0.15em', opacity:0.4, marginTop:4 }}>Archival Authority</div>
      </div>

      <nav style={{ flex:1, display:'flex', flexDirection:'column', gap:2 }}>
        {NAV.map(item => {
          const on = active === item.id;
          return (
            <button key={item.id} onClick={() => setPage(item.id)} style={{
              display:'flex', alignItems:'center', gap:10, padding:'10px 20px',
              background: on ? `${C.surfCont}90` : 'none',
              border:'none', borderLeft: on ? `2px solid ${C.primaryCont}` : '2px solid transparent',
              color: on ? C.primaryCont : `${C.onSurface}88`, fontWeight: on ? 700 : 400,
              cursor:'pointer', transition:'all 0.18s', width:'100%', textAlign:'left',
            }}
              onMouseEnter={e => { if(!on) e.currentTarget.style.backgroundColor = C.surfCont; }}
              onMouseLeave={e => { if(!on) e.currentTarget.style.backgroundColor = 'transparent'; }}
            >
              <span className="material-symbols-outlined" style={{ fontSize:18 }}>{item.icon}</span>
              <span className="font-mono" style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.12em' }}>{item.label}</span>
            </button>
          );
        })}
      </nav>

      <div style={{ padding:'0 20px', display:'flex', flexDirection:'column', gap:12 }}>
        <button className="archival-gradient" style={{
          width:'100%', padding:'11px', color:'white', border:'none',
          fontFamily:"'Space Grotesk',monospace", fontSize:10,
          textTransform:'uppercase', letterSpacing:'0.15em',
        }}>New Entry</button>
        <div style={{ borderTop:`1px solid ${C.onSurface}0D`, paddingTop:10, display:'flex', flexDirection:'column', gap:2 }}>
          {[{icon:'settings',label:'Settings'},{icon:'auto_stories',label:'Archive'}].map(i=>(
            <button key={i.label} style={{
              display:'flex', alignItems:'center', gap:8, padding:'5px 0',
              background:'none', border:'none', color:`${C.onSurface}66`, cursor:'pointer', textAlign:'left',
            }}>
              <span className="material-symbols-outlined" style={{ fontSize:14 }}>{i.icon}</span>
              <span className="font-mono" style={{ fontSize:9, textTransform:'uppercase', letterSpacing:'0.1em' }}>{i.label}</span>
            </button>
          ))}
        </div>
      </div>
    </aside>
  );
}

/* ─────────────────── TOP HEADER ─────────────────── */
function TopHeader({ title='PassionPath' }) {
  return (
    <header style={{
      position:'sticky', top:0, zIndex:40,
      background:`${C.surface}CC`, backdropFilter:'blur(20px)',
      borderBottom:`1px solid ${C.onSurface}0D`,
      height:60, display:'flex', alignItems:'center',
      justifyContent:'space-between', padding:'0 40px', flexShrink:0,
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:28 }}>
        <span className="font-serif" style={{ fontSize:17, fontWeight:600 }}>{title}</span>
        <nav className="top-nav-links" style={{ display:'flex', gap:20 }}>
          {['Dashboard','Logs','Library'].map((l,i)=>(
            <a key={l} href="#" className="font-mono" style={{
              fontSize:9, textTransform:'uppercase', letterSpacing:'0.05em',
              color: i===2 ? C.primaryCont : `${C.onSurface}99`,
              borderBottom: i===2 ? `1px solid ${C.primaryCont}` : 'none',
              paddingBottom: i===2 ? 1 : 0,
            }}>{l}</a>
          ))}
        </nav>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:16 }}>
        <div className="search-bar" style={{
          display:'flex', alignItems:'center', gap:6,
          background:C.surfContLow, padding:'5px 14px', borderRadius:999,
          border:`1px solid ${C.onSurface}1A`,
        }}>
          <span className="material-symbols-outlined" style={{ fontSize:14, opacity:0.4 }}>search</span>
          <input placeholder="Search Archive..." style={{
            background:'none', border:'none', fontFamily:"'Space Grotesk',monospace",
            fontSize:9, textTransform:'uppercase', letterSpacing:'0.1em', width:120, color:C.onSurface,
          }} />
        </div>
        {['notifications','history_edu'].map(ic=>(
          <span key={ic} className="material-symbols-outlined" style={{ color:`${C.onSurface}99`, cursor:'pointer', fontSize:20 }}>{ic}</span>
        ))}
        <div style={{ width:30, height:30, borderRadius:'50%', overflow:'hidden', border:`1px solid ${C.outlineVar}` }}>
          <img alt="User" style={{ width:'100%', height:'100%', objectFit:'cover' }} src={AVATAR} />
        </div>
      </div>
    </header>
  );
}

/* ─────────────────── MOBILE NAV ─────────────────── */
function MobileNav({ active, setPage }) {
  return (
    <nav className="mobile-nav" style={{
      position:'fixed', bottom:0, left:0, right:0, height:60,
      background:`${C.surfCont}EE`, backdropFilter:'blur(12px)',
      borderTop:`1px solid ${C.outlineVar}22`,
      justifyContent:'space-around', alignItems:'center', zIndex:50,
    }}>
      {NAV.map(item=>(
        <button key={item.id} onClick={()=>setPage(item.id)} style={{
          display:'flex', flexDirection:'column', alignItems:'center', gap:2,
          background:'none', border:'none', cursor:'pointer',
          color: active===item.id ? C.primaryCont : `${C.onSurface}66`,
          padding:'6px 10px',
        }}>
          <span className="material-symbols-outlined" style={{ fontSize:20 }}>{item.icon}</span>
          <span className="font-mono" style={{ fontSize:7, textTransform:'uppercase' }}>{item.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ═══════════════════ HOME ═══════════════════ */
function HomePage() {
  return (
    <div className="page-enter" style={{ display:'flex', flexDirection:'column', flex:1 }}>
      <TopHeader />
      <div className="page-wrap" style={{ padding:'40px 60px 60px', overflowY:'auto', flex:1 }}>

        {/* Hero */}
        <section style={{ marginBottom:64 }}>
          <div style={{ display:'flex', flexWrap:'wrap', alignItems:'flex-end', justifyContent:'space-between', gap:24 }}>
            <div style={{ maxWidth:640 }}>
              <p className="font-mono" style={{ fontSize:10, color:C.primary, marginBottom:14, display:'flex', alignItems:'center', gap:10, letterSpacing:'0.12em', textTransform:'uppercase' }}>
                <span style={{ width:28, height:1, background:C.primary, display:'inline-block' }}/> 01 // Overview
              </p>
              <h2 className="font-serif" style={{ fontSize:'clamp(36px,5vw,72px)', fontWeight:500, lineHeight:0.92, color:C.onSurface }}>
                The Architecture of{' '}
                <span style={{ fontStyle:'italic', color:C.primaryCont }}>Your Intent</span>
              </h2>
            </div>
            <p style={{ fontSize:13, color:C.onSurfVar, maxWidth:260, lineHeight:1.6 }}>
              A legacy document mapping your cognitive evolution and decision-making clarity.
            </p>
          </div>
        </section>

        {/* Bento */}
        <div className="bento-grid">
          {/* Clarity Score */}
          <div className="span-5" style={{ gridColumn:'span 5', background:C.surfContLow, padding:36, position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', top:8, right:14, fontSize:68, fontFamily:"'Space Grotesk'", opacity:0.05, userSelect:'none' }}>78</div>
            <div className="font-mono" style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.12em', color:C.onSurfVar, marginBottom:28 }}>Clarity Score</div>
            <div style={{ display:'flex', justifyContent:'center', padding:'12px 0' }}>
              <div style={{ position:'relative' }}>
                <svg width={160} height={160} style={{ transform:'rotate(-90deg)' }}>
                  <circle cx={80} cy={80} r={72} fill="transparent" stroke={`${C.outlineVar}40`} strokeWidth={1.5}/>
                  <circle cx={80} cy={80} r={72} fill="transparent" stroke={C.primaryCont} strokeWidth={3} strokeDasharray="452.4" strokeDashoffset="99.5"/>
                </svg>
                <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
                  <span className="font-serif" style={{ fontSize:56, fontWeight:300 }}>78</span>
                  <span className="font-mono" style={{ fontSize:9, letterSpacing:'0.2em', opacity:0.4 }}>/ 100</span>
                </div>
              </div>
            </div>
            <div style={{ marginTop:20, paddingTop:20, borderTop:`1px solid ${C.outlineVar}30` }}>
              <p style={{ fontSize:12, color:C.onSurfVar, lineHeight:1.6 }}>
                Decision-making threshold increased by <span style={{ color:C.tertiary, fontWeight:700 }}>+12%</span> this month.
              </p>
            </div>
          </div>

          {/* Current Direction */}
          <div className="span-7" style={{ gridColumn:'span 7', background:C.surfCont, display:'flex' }}>
            <div style={{ flex:1, padding:36, borderRight:`1px solid ${C.outlineVar}25` }}>
              <div className="font-mono" style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.12em', color:C.primary, marginBottom:28 }}>Current Direction</div>
              <div style={{ display:'flex', gap:14, alignItems:'flex-start', marginBottom:20 }}>
                <div style={{ width:4, height:44, background:C.primary, flexShrink:0, marginTop:4 }}/>
                <div>
                  <h4 className="font-serif" style={{ fontSize:26, fontStyle:'italic', marginBottom:8 }}>Systemic Synthesis</h4>
                  <p style={{ fontSize:12, color:C.onSurfVar, lineHeight:1.6 }}>Consolidating fragmented pursuits into a unified professional legacy.</p>
                </div>
              </div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {['Metacognition','Strategic Intent','Curated Focus'].map(t=>(
                  <span key={t} className="font-mono" style={{ padding:'3px 10px', background:C.surfContMax, fontSize:8, textTransform:'uppercase', letterSpacing:'0.1em' }}>{t}</span>
                ))}
              </div>
            </div>
            <div style={{ width:'32%', overflow:'hidden', minHeight:200 }}>
              <img alt="" style={{ width:'100%', height:'100%', objectFit:'cover', filter:'grayscale(100%)', opacity:0.8 }}
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuB1HSGJY3sKmNl5fzH-W48-VAXbN4iNJqZFCyWa612jpkeRlTBGdULKNk3sA847DT59czSLin8lngmW9yX5qYOMr-Dl2Bf5IlQf4yvaojLUNTZ9a5XpZD59JWD_yCaYzDFzllRMmN3b1IC7R-Mzd3Q0k93zhBc6Zbw01HuEHQCkt9jVsNEuOdCqzGWh8_qZB0AQUDfN1eX7E5qzWzOqRFflpP6lEhODoohIOHkdCiBgHGtfo6NU7M1WwMFHZjXwjS1Zc6Glc0Z3FWw"/>
            </div>
          </div>

          {/* Daily Focus */}
          <div className="span-6" style={{ gridColumn:'span 6', background:C.surfContLow, padding:36, borderLeft:`4px solid ${C.primary}`, cursor:'pointer' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:28 }}>
              <span className="font-mono" style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.12em', color:C.onSurfVar }}>Daily Focus</span>
              <span className="material-symbols-outlined" style={{ fontSize:16 }}>push_pin</span>
            </div>
            <h4 className="font-serif" style={{ fontSize:24, marginBottom:10 }}>Audit the 'Deep Work' threshold for quarterly goals.</h4>
            <p style={{ fontSize:12, color:C.onSurfVar }}>Remove three secondary tasks that are diluting your primary intent.</p>
            <div style={{ marginTop:32, display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
              <span className="font-mono" style={{ fontSize:9, letterSpacing:'0.12em', opacity:0.4, textTransform:'uppercase' }}>Priority: Alpha</span>
              <span className="material-symbols-outlined" style={{ color:C.primary, fontSize:20 }}>arrow_forward</span>
            </div>
          </div>

          {/* Timeline */}
          <div className="span-6" style={{ gridColumn:'span 6', background:C.surfContLow, padding:36 }}>
            <div className="font-mono" style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.12em', color:C.onSurfVar, marginBottom:28 }}>Journey Timeline</div>
            {[
              { idx:'01 // Mar 2024', status:'Completed', sc:C.tertiary, title:'Initial Research Paradigm Shift', dot:C.tertiary, italic:true },
              { idx:'02 // Apr 2024', status:'Active', sc:C.primaryCont, title:'Strategic Pivot: System Synthesis', dot:C.primaryCont, italic:false },
              { idx:'03 // Jun 2024', status:'Upcoming Gate', sc:`${C.onSurfVar}66`, title:'Market Authority Confirmation', dot:'transparent', italic:false, dim:true },
            ].map((m,i)=>(
              <div key={i} style={{ position:'relative', paddingLeft:24, paddingBottom: i<2 ? 24 : 0, opacity: m.dim ? 0.5 : 1 }}>
                {i<2 && <div style={{ position:'absolute', left:3, top:8, bottom:0, width:1, background:`${C.outlineVar}50` }}/>}
                {i===2 && <div style={{ position:'absolute', left:3, top:8, bottom:0, width:1, borderLeft:`1px dashed ${C.outlineVar}50` }}/>}
                <div style={{ position:'absolute', left:0, top:5, width:7, height:7, borderRadius:'50%', background:m.dot, border: i===2 ? `1px solid ${C.outlineVar}80` : 'none' }}/>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:3 }}>
                  <span className="font-mono" style={{ fontSize:9, textTransform:'uppercase', letterSpacing:'0.1em', color:C.onSurfVar }}>{m.idx}</span>
                  <span className="font-mono" style={{ fontSize:9, color:m.sc }}>{m.status}</span>
                </div>
                <p className="font-serif" style={{ fontSize:16, fontStyle: m.italic ? 'italic' : 'normal' }}>{m.title}</p>
              </div>
            ))}

        </div>

        {/* Footer */}
        <footer style={{ marginTop:64, paddingTop:20, borderTop:`1px solid ${C.outlineVar}22`, display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:16 }}>
          <div style={{ display:'flex', gap:40 }}>
            {[{l:'Last Archived',v:'Today, 08:42 AM'},{l:'System Status',v:'Precise'}].map(f=>(
              <div key={f.l}>
                <p className="font-mono" style={{ fontSize:8, textTransform:'uppercase', letterSpacing:'0.1em', color:C.onSurfVar, marginBottom:3 }}>{f.l}</p>
                <p style={{ fontSize:11 }}>{f.v}</p>
              </div>
            ))}
          </div>
          <span className="font-mono" style={{ fontSize:9, color:`${C.onSurfVar}55`, letterSpacing:'0.4em', textTransform:'uppercase' }}>Folio No. 1422-B</span>
        </footer>
      </div>
    </div>
  );
}

/* ═══════════════════ DISCOVER ═══════════════════ */
function DiscoverPage() {
  return (
    <div className="page-enter" style={{ display:'flex', flexDirection:'column', flex:1 }}>
      <TopHeader />
      <div className="page-wrap" style={{ padding:'40px 48px 60px', overflowY:'auto', flex:1 }}>
        <div className="discover-grid">
          {/* Left */}
          <div>
            <div style={{ marginBottom:48 }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
                <div style={{ width:4, height:28, background:C.primary }}/>
                <span className="font-mono" style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.15em', color:C.primary, fontWeight:700 }}>01 // Discovery Phase</span>
              </div>
              <h2 className="font-serif" style={{ fontSize:'clamp(30px,4vw,48px)', fontStyle:'italic', lineHeight:1.1, marginBottom:14 }}>The Weight of Choice</h2>
              <p style={{ fontSize:14, color:C.onSurfVar, maxWidth:480, lineHeight:1.7 }}>Each decision etched here defines the architectural integrity of your future self.</p>
            </div>

            {/* Dilemma */}
            <div style={{ background:C.surfContLow, padding:40, marginBottom:24 }}>
              <span className="font-mono" style={{ fontSize:9, textTransform:'uppercase', letterSpacing:'0.1em', color:`${C.onSurfVar}88`, display:'block', marginBottom:16 }}>Dilemma No. 422</span>
              <h3 className="font-serif" style={{ fontSize:28, fontStyle:'italic', marginBottom:20 }}>Depth of Mastery vs. Breadth of Versatility?</h3>
              <p style={{ fontSize:13, color:C.onSurfVar, marginBottom:32, lineHeight:1.7 }}>Would you rather be the sole authority in a vanishing craft, or a skilled generalist across three emerging fields?</p>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                {[{l:'Path A',t:'The Obsessive Specialist'},{l:'Path B',t:'The Adaptive Polymath'}].map(p=>(
                  <button key={p.l} style={{ textAlign:'left', padding:20, background:C.surfContHi, border:'none', cursor:'pointer', transition:'all 0.2s' }}
                    onMouseEnter={e=>{e.currentTarget.style.background=C.primary;e.currentTarget.style.color='white';}}
                    onMouseLeave={e=>{e.currentTarget.style.background=C.surfContHi;e.currentTarget.style.color=C.onSurface;}}
                  >
                    <span className="font-mono" style={{ fontSize:9, textTransform:'uppercase', letterSpacing:'0.1em', display:'block', marginBottom:6, opacity:0.6 }}>{p.l}</span>
                    <span className="font-serif" style={{ fontSize:17 }}>{p.t}</span>
                  </button>
                ))}
              </div>
            </div>

        <section style={{ background:'white', padding:40, border:`1px solid ${C.onSurface}08`, borderRadius:2, position:'relative', overflow:'hidden' }}>

            <p className="font-mono" style={{ fontSize:9, textTransform:'uppercase', letterSpacing:'0.1em', opacity:0.4, marginTop:4 }}>Competency Evolution Matrix</p>

          <div style={{ position:'relative', height:360, display:'flex', alignItems:'center', justifyContent:'center' }}>

                <line x1={500} y1={180} x2={300} y2={100} stroke={C.primary} strokeWidth={1}/>
                <line x1={500} y1={180} x2={700} y2={100} stroke={C.primary} strokeWidth={1}/>

                { style:{right:'22%',top:'18%'}, label:'Systemic Logic' },
                { style:{left:'50%',bottom:'8%',transform:'translateX(-50%)'}, label:'Ethical Inquiry' },
              ].map((n,i)=>(
                <div key={i} style={{ position:'absolute', ...n.style, width:84, height:84, borderRadius:'50%', border:`1px solid ${C.outlineVar}55`, background:C.surfCont, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center', padding:8 }}>
                  <span className="font-mono" style={{ fontSize:7, textTransform:'uppercase' }}>Tier II</span>
                  <span className="font-serif" style={{ fontSize:11, lineHeight:1.2 }}>{n.label}</span>
                </div>
              ))}
            </div>
            <div style={{ position:'absolute', bottom:12, right:12, background:C.surfCont, padding:12, border:`1px solid ${C.onSurface}08` }}>
              {[{filled:true,label:'Mastered Authority'},{filled:false,label:'Developing Insight'}].map(l=>(
                <div key={l.label} style={{ display:'flex', alignItems:'center', gap:6, marginBottom:l.filled?6:0 }}>
                  <div style={{ width:8, height:8, borderRadius:'50%', background:l.filled?C.primary:'transparent', border:l.filled?'none':`1px solid ${C.outlineVar}80` }}/>
                  <span className="font-mono" style={{ fontSize:8, textTransform:'uppercase' }}>{l.label}</span>
                </div>
              ))}
            </div>
          </div>
        </section>

        <footer style={{ borderTop:`1px solid ${C.onSurface}08`, paddingTop:20, display:'flex', justifyContent:'space-between', alignItems:'flex-end', opacity:0.4 }}>
          <div className="font-mono" style={{ fontSize:9, textTransform:'uppercase', lineHeight:1.9 }}>
            Persistent Index: G-2404-001<br/>
            Encryption: SHA-256 Validated<br/>
            Authority: PassionPath Central Repository
          </div>
          <div className="font-serif" style={{ fontStyle:'italic', fontSize:15 }}>The permanent record of progress.</div>
        </footer>
      </div>
    </div>
  );
}

/* ═══════════════════ APP ROOT ═══════════════════ */
function App() {
  const [page, setPage] = useState('home');
  const pages = { home:<HomePage/>, discover:<DiscoverPage/>, path:<PathPage/>, mentor:<MentorPage/>, growth:<GrowthPage/> };
  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      <Sidebar active={page} setPage={setPage}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minWidth:0 }}>
        {pages[page]}
      </div>
      <MobileNav active={page} setPage={setPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
